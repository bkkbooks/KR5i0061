入官屠陽孫正于桑瓜里鹿陽谿舌秋梁都丘里撻燦塔寡㝛盆長仲光慕淳車柘有鍾宇司同伊東叚南左誣閭北哈𡃤哈成孫之藥容于千㧞娥離文徒空祈郭午宫丘馬丘宫𡃤叭𡃤𡻕刑公添微儀玉端常天太屈束左有提叔拜公吾南待綦陸烏尺西雕生封孫木夀象史侯門師扈彌梁官儀邱郭其母里陀盧天狗子雍梁斛落子䲭沈公達公索梁斟蒲沮乞黎斟豆路鉄鮮吐濯門近期下車夷猶叔奚行盧餘灌察渠伏利鄩盧中木麻畨的煞賀賀路釣息賀屈胡斛沙烏僕俗夫迷吐浦執阿高義勒握倪㧞蘭中戈夫若𥥛母律陀孫固渾餘律谷姑失跌車渠吐𠰋蘓伏尸契屋母桐風盧宰相時左步由荔公乘零東巾司巿少魏其佻密丘里沙蒲父侯閭人叔吾蒲正焉丘里門城南正彌勒落天厄公浩魯長於善浩䝞仲陽熊安公哈何必忽脫秄揭了虎胡夷土生陽勺陵陽生射叔城相平明嘛骨烈必脫𥝲只孤虜狄莫以上自擎天司至破碎司共四十三司每司司四十二姓挨排而加以射各姓自亡神司至天厄司共十司每司司二十四複姓挨排而加加完本司則借擎天以下諸司加推以射複姓射人表號亦同此推以下值使諸局式惟太𡻕天空災煞天哭天煞急脚年煞大煞黄旙㧞鞍等司不管事此四圖各黑圈内之字原本係另用紙冩好釘在圈内當中葢取其能轉運也兹不過恐有遺失故書在圈内特記訣曰地盤諸星天盤同但以所加爲機鋒三十四司日同配各星宫假如寅宫星五個每司六日一月中其間玄妙無難曉惟以生定吉凶若能了達機鋒理天地陰陽在掌中正月天盤寅在亥二月在丑三月子餘倣此内爲天盤逆行外爲地盤順行逆動而順不動也先天後天相交生與尅先後震生兌後後先先兌生㢲先先後後㢲生離後後先先離生坎先先後後坎生坤後後先先坤生乾先先後後乾生艮後後先先艮生震先先後後先後後天之震卽丑寅正卯天之兌卽正酉天辰巳地之丑寅正卯生地天之正酉辰巳也餘倣此先後乾尅兌後先兌尅離先後離尅震後先震尅㢲先後㢲尅坎後先坎尅艮先後艮尅坤後先坤尅乾先後先後天之乾卽正午後戍亥先天之兌卽正酉天辰巳地之正午戍亥尅地天之正酉辰巳也餘倣此先天十二神生尅前四門先天之學其生尅當視此子午生丑丑未未生寅寅申申生卯卯酉酉生辰辰戍戍生巳巳亥亥生子午此相生也用神應視此子亥尅卯卯巳巳尅午午申申尅酉酉丑丑尅寅寅戍戍尅未未辰辰尅亥子此相尅也轉車莫應視此琢玉歌太極未判昏昏過天機人事朦朧度以後陰陽漸漸分二氣成胎生理數自從此後便希奇紛紛巧妙由人做盡道興亡我可摻乃知俱被天籠鎻若能透徹陰符謀五行八卦皆降伏我今作此琢玉歌反覆細玩可通曉但以七門爲準的發矢决不差分杪先推輪範定天時次算車與車莫分地理加以用神知人物復推十將定事機其法但從年起月月上定朔推時辰假如上元癸亥年輪範十門𨚫在寅宫住一年一週尋合宫月日與時逆同之車與車莫二門以上年尅宫先理陰陽後加數陰陽卽順逆也月建同推日亦同惟有時辰尅逆數用神在三門寅生我宫一年一週君莫悞十將四門在丑尅我宫三月一飛到辰中未到戌司秋冬月法日時法同寅卯之到申酉中六月一飛須通融善司五門生我無差忒陰陽上下司年月子年子上尋寅月一月一宫逆數輪宫中諸宿司軸日其宫均配同機鋒機鋒六門𨚫在比和中地盤𨚫與諸星天盤同但以所加爲機鋒三十四管三十四司日均配各星宫假如寅宫星五個每司六日一月中申宫獨有天槍星此星獨管三十日其餘值司亦同此值使七門但推冲上算月曰時辰亦在冲七門但以所加處便知所爲是何事天盤夰加地盤司天輪範門夰算得天字無移差加囦爲孛加屵緯飍上尋妖焱客隨風雨陰晴并霜雪一切司天同此推惟尋月將加於時便是神仙莫出此月將之法無難曉正月尋亥逆上討地上穴吅口夾加天上分地車與車莫門罕干吅口夾𨚫是分地太原府加𡿧忻代無疑惑加出出厂和平陽細尋繹居址去來并出處任選興兵及豐歉算准二盤無差錯欲知此日何處接何人邀請何謀遇但以十二用神推便知交接何人物欲知今日爲何事木兄几十將門事事機章内討端的欲知應騐何時先木兄几善司門日細何先機尋秘訣欲知幾人幾何刻應木兄几鋒門事兵馬錢粮有幾許其人舉動因何件細向機鋒尋討覓欲知其人是何姓測候值使門排行第幾何名字有女幾人子幾丁娶媳何氏嫁何宅奴僕田產有幾許妻妾何氏隣何姓性情心事陰私計不用開談心己覺其法測候門中覓前知一千後五百若能推算無差訛雖是神仙跳不出大凡卜筮預先知通門打算無漏遺後學熟此作標題天地乾坤掌握裡右歌本於姜太公原本共有三千八百四十二句諸葛孔明刪去三千七百三十六句止存一百零六句最爲玄妙雷同章悟此雷同方能入式運用夰夾雷乾呆乾同合一宀勺一高總覆也包褁也充火溥幹索寒暑變易品物咸亨運不息昭垂窮勳惟遠造厥弘夰世世雷乾杲艮同合二宀宀其高囦囦其深正其威儀蹈其大禮上其上下其下不凌不替夰班雷乾杲離同合三介燾燾焱炵炵冏於太虛助也普照也艷火光通火也燝開明也鎣縈去声平元首貝見昦晶䀠環照頼之顯勿育萌貝見昌召切超去声普視也昦昊春爲天廣大也夰母雷同合四冖冖覓覆也其飛龍沓飛龍之狀悚悚其砉畫皮骨相𩀌声子盡倫常父盡慈道綱常合轍天其霹𩆝合宜夰申申雷乾杲耿耿也其么𢆶𢆶細小也憂微細也其飍因彪大風起暴風從下而上之萌盪行九有之濱𡦽罔有弗順夰𡿧雷乾杲坎同合六燾旡攵厂幹玄玄卒囷囷縲倔弜崛强弓有鼠竊竊糸誩胥競爭言也贛譶其譶污㗊其戬眾口貌㗊夰出出厂和雷乾杲艮同合七顚屾新山並立盈北入入屵癶癶岳高山狀鉢足有昕刺也屵小凌大身處卑下善含凶行其高潔屵小凌大身處卑下善含凶行其高潔迯已夰雷同合八宀㐬𦬇突舉上下之質失其宀勺一墜其㐬𦬇務陰陽乱霚冪冪氣覆也霿䨛䨛茂析雨也上下不洽㐬乎廣切𦬇莫榜切先機章第一陰符之理妙通玄數合先天兼後天後天不過由眾數先天直窺太極前太極有一便生二生二生三更無邊無邊之理莫執一神而明之可通仙輪範車與車莫有七門七門各有天地盤地盤順排不可動天盤逆轉流行焉一定之中有不定不定之内數以宣千變萬化由此出年月日時一線穿得其指者玄而神不得其指執以滯古人因理以定數後人因數以測理只爲理上㸔不清遂至占數亦不神果能養心如太極先天一念機已决若使雜念侵靈臺擾擾紛紛當决裂先天渾然一個理後天乃多形與象一落形象便多般窒礙不通成魔障學人悟此休言數先去治心爲本數一片空明似太虛具機上法應無誤心機章第二天地萬物惟一理有理而數存其中後人言數不本理以致荒忽無所宗只言夫理有一定兼言乎數多錯綜所言地盤只一定天盤變化應無窮地盤夰是乾之體加之以罕干吅口夾坤之功再加以人事起展轉推加各類通漠然无朕本無數天機一動數卽逢忽然有人來禀事偶見一物亦可窮或爲耳聞或心動或爲鳥鳴或起風皆有神明來告君感而遂通當卽悟聖人以靜爲養心以動爲機以占數吉凶悔吝可預知融類旁通機以露大小安危皆有機因幾得幾道之佐聖人默默原無言指㸃當前道爲破錯綜相加章第三天地相交一日一度故推算必逆轉輪去相遇而數合焉此卽乾坤姤復之理凡事遇奇無成遇偶有成故必曰兩數相數而後見數輪範車與車莫十二神十干皆先天之學也自善司至機鋒値使則爲後天之神煞依着後天算去自得善司爲吉神値使皆囟神也其機鋒諸司則爲天上之星善惡皆有焉推其星辰之所司與其性情之善惡則吉凶思過半矣陰符雖曰數然實有星君神煞掌管其事每推演當臨之在上質之在旁則神明式憑之不可以其數而忽之也遇一數則爲夰二數則爲飍字恐誤疑作鋋輪範車與車莫先天之方位以夰屬午以甡屬子卽乾南坤北之理也焱囦酉卽離東坎西之義以雺配丑丑卽以雺斷以飍配未未卽以飍斷也七門各各有所主倘逢事變錯綜加假如輪範已算定已知天時雨與晴要知此日何人來卽便加入機鋒算算定何時有何事百不失一無謬亂要知其人姓與名又加值使通盤算奥妙精微細細推不妨逐事更端換摸換章第四又如一事推一數已定其數凶與吉忽又有人旁問焉卽進一位再加算一時輪轉八位畢再借明日推算去重復算去得一週縱橫反覆皆可取現前指㸃數何如隨事隨占隨物指天機活潑自無窮不是神仙莫可語十二用神十將章第五十二支神本先天十千神將非後天先天自有妙理世人不知用後天後天推測亦有數乃知變化由先天俗子耽著小形骸血肉爲形血肉心純以氣盾而用事安能畚田水彼無象眞我今指出先天學爲事未形先有神曠然无朕超大吾只此便是羲皇心無意之中有深意天機乍動莫可尋有意尋求後天事何從測彼道之萌惟有兀兀毓道源兀兀無言道體全從此道機發動處指㸃玄奥皆眞詮顚例生尅爲我用一切神將皆隨焉觸機章第六世人紛紛學起數太乙奇門六壬佐三式之書非不眞汗牛充動何處尋世無絶世神靈子得數方將書對理靈臺方寸已紛紛那知何說堪爲主其法先要熟讀書讀罷此中無一字臨時融處道機合一言指㸃萬事畢煉將章第七數學千年一轉輪軒轅道祖發其眞夏主神禹施玉䇿咒水書符役鬼神嗣後商周大殺伐全憑丁甲轉威神丁甲之法無多事先煉心將爲之根心將玩熟用符咒排兵布障稱天兵後人欲學丁甲法當學元始大法眞兼及九天聖母術方能臨陣任縱橫我値䖍劉大刦運斬將封神皆有因三十六處多左道漸漸消除奏廓清區區數學不足重必須煉法爲前程一切小法俱無濟小知大遇不敢逞雖然得法不可縱代天宣化法方靈非法不足以衛道非法不足以安民朝乾夕惕始可用倘或恣肆鬼神嗔我願後人學吾法濟世匡時佐聖君法成功立仙果證道德巍巍朝玉京煉將有專司章第八總而言之曰丁甲其實用之各有司六甲陽神主戰鬥六甲陰神䕶我身甲寅用以驅猛虎甲辰用以霈甘霖甲子用以督水戰甲戍用以守城堙甲申最勇戰必勝甲午用以火攻營六丁最靈主機宻偷營刦塞兵如神能取敵人一切物來無踪影去無形旬中玉女力更大攻者必敗戰必贏六戊用以閉城堙六已可以聚粮屯六癸天網四張時只可迯形隱跡行更有六旬値日將保護主將除病根又有六十日玉女靈通無賽逞飛英偷符換印尋常事怪異千般莫吃驚惟將丁甲總煉咒一切神將𦂳隨身但能煉得神將熟有兵十萬可縱横數以任道章第九數惟建功立業設非數無以明事機吾人秉性雖奇頴安能動與鬼神俱事機當前不能决須藉數以測幾微數之靈變如丸轉豈能事事合機先惟有此數神且簡不啻裡掌中天輪範車與車莫平日算臨時只玩後三篇驕兵悍將逞英雄狡人譎士施機巧倘或遇之勿中竅綱紀烏能統一焉惟以此數神眞用智力勇者岡敢愆此皆末世之術法可以佐道之機權用機在目章第十五賊三盗各有機機之最靈惟在目九竅三要各有機機之最急亦在目萬事萬象錯錯然運用只在神明獨運用固爲應物要機之所至有因觸聽其所言觀其眸知覺運動必不侔凡於鍳觀一切處目露眞情勿用求勇者一身雖强悍若怯必於目知端惟目可以審事機千變萬怪不可論獨於世人皆有何目獨哲人窺之速但以至靜爲之基淵淵此心深若谷以靜禦動自判然旁觀洞矚如棋局數以陰符如㨗章第十一國家大事用太乙編年卦例重重說何處正統何窃㨿古人算定不可越一時制數用竒門各項格局須要精戰勝攻敗非易事要伏丁甲爲縱橫六壬鎻碎爲辨別不如陰符爲直㨗八卦甲子搬演熟一帙可該六間屋先天用將章第十二先天一卦宗太極後天一卦宗五行先明先天以爲體次演後天以爲用先天陰陽猶未判穆然無朕惟一炁後天搬演諸五行生尅制伏詳厥理生尅不外五行中明其指者通於數一切星司與神煞皆本日辰干支推干支當令我當勝干支被尅我當負爲客利於上尅下爲主利於下尅上若逢比和當均解战亦兩平無彼此呼神遣將壯軍威不拘悔吝生與死其法要在煉將熟呼吸通神無顧忌一憑神將去推鋒不算天時并地利數以反道章第十三道生天地生陰陽天地陰陽無非道道生萬物生五行萬物五行無非道王人因源以達流故不言道而言數學者因流以遡源便當見數卽見道道旣全兮數以全數旣全兮機以宣機旣宣兮數不竭愈增饒舌徒多言後人學數定多人道未成時數不精故爾紛紛共言數不如學道反其根學數僅爲功業事學道方能朝玉京補遺一十三章出目諸葛孔明陰符一書秦火之後竟失其傳吾得南陽先生地中所藏原本因加推算百不失一自吾以後傳者又頗不全葢皆抄錄悞也予今旣得其書以俟將來用世者之揣摩焉震生兌卽丑寅生辰巳乾尅兌卽正午尅辰巳兌生巽卽辰巳生未申兌尅離卽辰巳尅正卯巽生離卽未申生正卯離尅震卽正卯尅丑寅離生坎卽正卯生正酉震尅巽卽丑寅尅未申坎生坤卽正酉生正子巽尅坎卽未申尅正酉坤生乾卽正子生正午坎尅艮卽正酉尅戍亥乾生艮卽正午生戍亥艮尅坤卽戍亥尅正子艮生震卽戍亥生丑寅坤尅乾卽正子尅正午震生兌卽正卯生正酉乾尅兌卽戍亥尅正酉兌生巽卽正酉生辰巳兌尅離卽正酉尅正午巽生離卽辰巳生正午離尅震卽正午尅正卯離生坎卽正午生正子震尅巽卽正卯尅辰巳坎生坤卽正子生未申巽尅坎卽辰巳尅正子坤生乾卽未申生戍亥坎尅艮卽正子尅丑寅乾生艮卽戍亥生丑寅艮尅坤卽丑寅尅未申艮生震卽丑寅生正卯坤尅乾卽未申尅戍亥
