body:
  text: 行道章澄心滌慮屛去他思删芟𡽪纒斬絕塵緣入道章淡泊甯靜涵育薰陶由道章有聲之聲延及百里無聲之聲延及四海神而之神知及千古不神之神知及萬年出道章天機地機俱己寂寞人炁天炁合而爲一五賊三道亦已微絕㤙生害生亦己盡滅迅雷烈風亦不我動生死榮辱亦不我怯造化在手天地胸臆從空中來由無中入大陰符不爲五行束縳不爲八卦牢籠乃太極未判之旨陰陽未分之機葢易卦奇門太乙六壬皆不外夫五行陰陽支干生尅之理數此則獨擅先天之玄秘焉陰符演局司天輪範此輪之綱也夫輪者轉也範者法也爲天之運行於上不言而品物咸亨𡻕功成聖人取法夫天端拱於上不言而百姓親萬邦甯取曰輪範此意也夰音杲大也乾象鋋音言小矛也兌象焱卽熖離象雺音矛天氣下地不應也震象飍音彪大風也巽象囦卽淵坎象屵音岳高山也艮象甡音莘坤象此八字爲天盘運行雖若八卦之象而生尅運用五行吉㐫俱不同夫八卦分地車與車莫此車與車莫之綱也夫車與者地之象取夫靜車莫者事之楷取夫規言聖人上法夫天下法夫地中合夫人以成無爲之治也罕干吅口夾音默夰體音通鋋體王厂王音烈焱體吅口母吅口音信雺體申申音揚飍體𡿧音災囦體出出厂和音純屵體夭大虫凶廾音靜甡體此八字爲地盘取靜以鎭四方以定四隅罕干吅口夾爲西北爲正西班爲正南吅口母吅口爲正東申申爲東南𡿧爲正北出出厂和爲東北夭大虫凶廾爲西南輪範生尅雺生鋋鋋生飍飍生焱焱生囦囦生甡甡生夰夰生屵屵生雺此輪範之相生也夰尅鋋鋋尅焱焱尅雺雺尅飍飍尅囦囦尅屵屵尅甡甡尅夰此輪範之相尅也車與車莫生尅吅口母吅口生生申申申申生王厂王王厂王生𡿧𡿧生夭大虫凶廾夭大虫凶廾生罕干吅口夾罕干吅口夾生出出厂和出出厂和生吅口母吅口此車與車莫之相生也罕干吅口夾尅尅王厂王王厂王尅吅口母吅口吅口母吅口尅申申申申尅𡿧𡿧尅出出厂和出出厂和尅夭大虫凶廾夭大虫凶廾尅罕干吅口夾此車與車莫之相尅也輪範車與車莫生尅雺生生飍飍生王厂王王厂王生囦囦生夭大虫凶廾夭大虫凶廾生夰夰生出出厂和出出厂和生雺雺生鋋鋋生申申申申生焱焱生𡿧𡿧生甡甡生罕干吅口夾罕干吅口夾生屵屵生吅口母吅口此相生也夰尅尅焱焱尅吅口母吅口吅口母吅口尅飍飍尅𡿧𡿧尅屵屵尅夭大虫凶廾夭大虫凶廾尅夰罕干吅口夾尅鋋鋋尅王厂王王厂王尅雺雺尅申申申申尅囦囦尅出出厂和出出厂和尅甡甡尅罕干吅口夾此相尅也輪範屬先天之學夰甡一道甡尅夰者言地可以勝天而人更可勝地葢地近而天遠而人更近於天地也他則尅爲凶夰生陽道生天生五行生星斗生金玉生龍馬生日月生男女夰甡雖分爲二而生養萬物培植二氣則一也甡生陰道生地生山川生草木生金玉生飛禽生雲霧生走獸車與車莫屬後天之學罕干吅口夾夭大虫凶廾亦一道也其夭大虫凶廾尅罕干吅口夾者亦人勝地地勝天之意也聖人之道先其近而後其遠惟盡人道而後可以參天地也罕干吅口夾亦生陽道生天之質生五行之精生龍之變生馬之馳生日月之光明夭大虫凶廾亦生陰道生地之形生山川之象生禽之飛生獸之走生男女之性靈人物十二用神此用神之綱也十二神者乃先天之十二支其生尅不同於後天之十二支年月日時同推此逆局也順生逆尅清凶丰貞一一冊樸質殅誠卽生𦕟亷暴潔卽暴宴女夰烈半半半英𤽡白戶必出狹幺各口田逮傑事機十將此十將之綱也此乃先天之十干也其生尅與後天之十干同棘甲几震出工一事㞢離券刀土坤圠戌㑒申禹兌洤癸子十二神生尅卽前順生之謂生一一册一一册生生殅殅生𦕟𦕟生暴暴生宴女夰宴女夰生半半半半半半生𤽡𤽡生幺各口田逮幺各口田逮生上𤽡𤽡凶丰凶丰以上尅十將生尅十將之生卽前順生之謂棘生儿儿生出工一出工一生㞢㞢生券刀土券刀土生圠圠生㑒㑒生禹禹生人土人土生生棘此相生也棘尅券刀土券刀土尅人土人土尅出工一出工一尅㑒㑒尅儿儿尅圠圠尅尅㞢㞢尅禹禹尅棘此相尅也十將之尅與十干同先幾二十四善司太公所封後天之主此善司之綱也太陽紫微福德天喜解神天解金匱貴人天德龍德福星紅鸞月空八座將星玉堂金輿三台陌越馹馬太陰月德𡻕合地解甲尅戊戊尅壬壬尅丙丙尅庚庚尅甲甲尅乙乙尅已已尅癸癸尅丁丁尅辛辛尅乙刻應三十四機此機鋒之綱也天厨天壘天淵天桴天籥天弁天江天輻天門天田天槍天廟天稷天相天社天紀天狼天關天讒天苑天陰天街天潢天高天船天庾天倉天囷天廪天厩天罇天鷄天園天溷事機仍用十干可測候六十四值使此值使之綱也太𡻕劍鋒擎天天空陰煞紅艷灾煞𡻕破天哭囚獄暴敗天杀𡻕煞天厄大耗闌干孤辰䘮門急脚白虎地䘮飛廉大杀指背地杀羊刄六害貫索流霞飛刄年杀勾絞卒暴六厄卷舌披麻咸池官符披頭五鬼血刄豹尾吊客飛符華葢黃旛月杀吞䧟浮沉刼杀死符破碎亡神天符病符小耗的煞扳鞍寡㝛伏尸天符𡻕刑天狗晦氣七門分類輪範爲司天門主知風雨陰晴水旱灾荒車與車莫爲分地門主知出入道路何方不甯居址生長地方何方荒歛用神爲人物門主知一日交接何人往來何人謀事何人邀請十將爲事機門主知我之行藏彼之舉動善司爲先幾門主知應在何日騐在何時機鋒爲刻應門主知人之舉上因何事以及何物等情值使爲測候門主知何姓爲事何姓興起何人輔導右七門乃死規而圓機在人不可執一也七門各屬輪範爲司天門章分二十八宿此輪範之目也乾夰司天孛緯彗妖客旱霄胃昴畢觜坎囦司兩氷露雹雪晦陰寒室𨐧奎婁艮屵司雲霞靄氣霜霰氛氲牛女虛危震雺司雷霆虹晷霪流暉和心尾箕斗巽飍司風飈凉晴冥濕曦艷角亢氐房離焱司日電霓影火陽暄暑張翼翼軫坤甡司烟霧霾沙昏塵暗迷鬼柳星張兌鋋司月星霖躔瑞雪斗度參井井鬼車與車莫爲分地門章此車與車莫之目也乾罕干吅口夾分冀州太原忻代平陽解綘吉隰大同路安遼沁坎𡿧分幽州順天保定河閒眞定順德廣平太名永年艮出出厂和分青州濟南兖州東昌青州泰安齊東登州萊州震吅口母吅口分閩越杭麗會稽金衢温臺福州泉州延平邵武巽申申分揚州江南淮陽徽甯吳郡昆陵廣東潮州高州離王厂王分荆州湖南荆襄江西建昌廣西太平貴州思州坤夭大虫凶廾分豫州開封歸德衛輝彰德懷慶河南南陽汝甯兌分雍州陝西鳳翔漢中四川保甯重慶雲南永甯用神爲人物門章此用神之目也子君父后𡚱母儲女生候輔丑僧尼仙道佛奸邪誣優伶寅一一冊士農工賈漁樵吏兵舅媒卯聖賢忠臣貞烈仁良善妻辰殅空病詐跛跎肥己𦕟將帥謀勇義俠剌仇敵虜午暴臣子公卿伯牧守使宰尹未宴女大介人醫卜星相姊妹親癡才孝申半半半奴婢宦巫倡妖隣鬼魔賊酉𤽡神盗丐棍惡技幻狂逆愚戌空眇秃長矮病丙粦亥幺各口田逮叔伯兄弟姪幼婿孫甥妾以上十二神加殅卽爲空無有人物交接惟殅加𦕟暴宴女大介人半半半是日必有病詐跎跛肥等人來也加𦕟暴宴女大介人半半半是日必有眇矮長秃病丙粦等人來也十將爲事機門章此我之事機十將之目也進战退守偷刼行刺邀擊截路舉用黜退儿告退謀任詐誘用間反叛私通弑奪誅戮出工一要請埋伏互換求救應援設疑出奇詐降㞢投誠逃遁休息提調分撥扼險遊說結納券刀土空惟加圠則爲守舊加本位則爲明德圠空惟加券刀土則爲和解加本位則爲禁令接引宻謀乘雨乘雪暗乘賞勞羞辱禁固陣战夾攻穿城掘地釋放縱逃追趕固守洤佯敗野挑施惠赦宥先動後舉掩襲用人水㕦擒縳决水魘魅假托蠱惑耀武濟渡絕粮善司爲先幾門章此善司之目也太陽同天德立春甲子乙丑丙寅丁卯戊辰已巳庚午清明正月後六百二太陰同月德立冬辛未壬申癸酉甲戍乙亥丙子丁丑穀雨三月百八二四紫微同龍德立夏戊寅己卯庚辰辛巳壬午癸未甲申小滿二月三百三六福德同福星立秋乙酉丙戍丁亥戊子己丑庚寅辛卯芒種四月四百二四八天喜同紅鸞春分壬辰癸巳甲午乙未丙申丁酉戊戍小暑六月五四百六解神同月空秋分已亥庚子辛丑壬寅癸卯子時午時大暑五月六六七二天解同八座丑正時未時甲辰乙巳夏至丙午丁未戊申白露八月七八九六金匱同將星已酉庚戍寅時申時冬至一刻辛亥壬子寒露九月九百二一千貴人同玉堂雨水癸丑甲寅二刻乙卯卯時酉時丙辰霜降十二月八八四十八三臺同金輿處暑三刻四刻丁巳六刻七刻無期亥時大雪七月千一千二陌越同馹馬驚蟄戊午昏夜辛酉戍時壬戍陰陽癸亥小雪十一月千三千五地解同𡻕合小寒巳時己未空空庚申晴期辰時八刻大寒十月十四十六機鋒爲刻應門章共三十四司每司各司三十四司此機鋒之目也管人之行止起居動住莫不全備丑天厨司占天占雲望雲郊天呼風乘風占風藏氷占星發氷步月賞月占月曝日避日吟詠冒雪踏雪玩賞望雨冒雨雨阻禱雨冒風卜雨冒霧占霧望風伐氷望虹電占日色禱斗救火丑天壘司烹雪祈晴占象禳火察變占緯驚雷驚霜畏日怨天怕風傷雨覘霓傷雹占烟霞望氣占河漢上疏請旨草詔濟世聞風聲喚雨役鬼神登山疏河道遊名山遊江湖觀流泉鑿池沼投江湖投河投井耕田子天淵司囊沙出行罷市就封爭城咒水埽地入山攻城埽墓刻石開市設鎭鑿井泛海叛國遊水文身安邦刻木入境歸家問津扼險渡江登基立國銘碑渡濟築園鑄銃割地渉水築城子天桴司毁城遷城據城擇隣望塵避亂逃難汲水飲水假道附國遷移渡關防胡申文請詳解犯劈𡨚决囚伐國禦敵战場打丁絫糸人水演試場防邊防海防姦通畨防江防港辭權專恣成功當權亥天籥司爭奇握令布法鬥巧失勢犯禁紀功作成囘駕乘勢賀𡻕賀喜賀夀迎春迎喜尋春防秋防夜廵更趨時占年避暑守𡻕賀節𡻕賽社待漏䕶月䕶日占氣占時玩景告朔禦冬置𡜠亥天井司造暦日目頒暦日目祈社憂時歡世賭博猜謎安葬造墳煉葯煉丹春耕秋荐夜讀早起夜行晝寢曉行夜漁春試秋試秋歛春荐冬狩昏定秋省晨省時祭夙念病疾怨恨思憶愁寒乘凉戍天江司望財憂旱踏青一數釋奠祀先驅𡻕秋遷春選山居二數水战馹㝛飛遞野合鄉飲饑寒避暑貧苦乞丐飽煖呼童求賢求官求名稱臣靣聖安民屯兵引兵求仙邀賓三数重三戍天輻司重二重一延師從軍訪友盟誓求籖問筶算命行醫求醫服藥燒崇賣卜擇友取土出任拜將代父教子親病告病告老致仕出戍拜相結友約交輔孤托孤見賢納客納賢四數酉天門司益兵大敗進兵讁貶犒賞尋親尋兄尋友買僕罘婢買婢僕重四尋子弟尋婢㓜尋親戚娶妻納妾生子娶媳婚聘結姻生孫逐婢奸彈奸攻盗捉賊出首作吏詞訟和息爲僧爲道官差合夥酉天田司投書交易托人栽種尋迯觀海盡難自刎自縊烹茶㸔花賞花吟咏祭旗招兵積粮積草買馬置甲蒸梨蒸飯烹葵烹菜作韲種蘭蕙植樹木種菊食果納票徵粮刈麥種麥請俸納課申天槍司罰俸採藥伐木賞玩採桑結茅負薪樵柴種蔬採茶揲著捆屨織蓆織布折花眼草揷秧扳柳刈稻炊麥煮飯戽水米云草下種灌田編蒲賣花杖藜收谷芟荆編籬獲奸造弓造箭未天廟司掩扉婚姻陰私竊盗烹炰騎驢牽羊騎馬騎騾囊螢觀鳬哇井遇虎遇狼遇熊犬咬畫虎射虎奠雁逐鹿策馬飼馬射獸射禽虎傷石