front:
  text: 太公陰符經太公陰符經序太公陰符者聖人之神機兵家之昧語也觀人之動靜而洞其衷情察人之行止而知其心事不待言語相告而豫決之者也斯謂微乎微乎至於無形神乎神乎至於無聲者是矣自太公以後蘇秦張儀孫臏鬼谷之徒雖曰知之然亦不過揣摩其一二而已及於秦氏火焚世無傳本知之者絕自漢唐以來迄今千餘載惟漢諸葛武侯明之而已其他季衞公岳武穆劉靑田輩擅絕世之才世號知能之士而亦未嘗聞之也余初讀之時見其文不達理詞不成章以爲妄而棄之也及至戊辰秋見同寓友人錫山趙鵬舉笥中亦有此卷取而讀之與余所得若合符節無有一字之錯謬第款式年月之不同耳駭而問之而鵬舉父子皆喜之者亦武侯之後一人也因請試之時坐有一僧像貌魁吾身體肥胖余因私謂其子斌公曰此僧何其肥胖也斌公卽以竹扇於几上一擲鵬舉笑曰意謂此僧之肥胖耶其時私相授受之語一動彼已知之豈非微妙神明焉能至此余於是拜於門下盡傳其訣力行五載而始成噫蓋亦難矣世無可傳者亦無可語者謹將此訣祕之以俟後之高明者耳陰符經目錄
