body:
  text: 行道章入道章由道章出道章司天輪範分地車與車莫輪範生尅車與車莫生尅輪範車與車莫生尅輪範屬車與車莫屬人物十二用神事機十將十二神生尅十將生尅先機二十四善司刻應三十四機測候六十四值使七門分類輪範為司天門章車與車莫為分地門章用神為人物門章十將為事機門章善司為先機門章機鋒為刻應門章值使為測候門章十司以射復姓輪範先天方位局式車與車莫後天方位局式十二用神局式十將局式善司局式機鋒局式先天後天相交生與尅先天十二神生尅琢玉歌雷同章先機章第一心機章第二錯綜相加章第三摸換章第四十二用神十將章第五觸機章第六煉將章第七煉將有專司章第八數以任道章第九用機在目章第十數以陰符加捷章第十一先天用將章第十二數以反道章第十三補遺一十三章出自諸葛孔明先天生尅圖後天生尅圖
  hash: sha256:f290fe215129994c97ce1c84719b4ec43f488062bc1cb707d41a7f0837c406b0
